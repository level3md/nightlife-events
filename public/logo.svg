<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="outerRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="45%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
    <linearGradient id="goldL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="blueR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2B5FD4"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </linearGradient>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="98" fill="url(#outerRing)" />
  <!-- Blue inner border -->
  <circle cx="100" cy="100" r="88" fill="#1B3D8C" />
  <!-- White inner circle -->
  <circle cx="100" cy="100" r="82" fill="white" />

  <!-- L -->
  <text x="28" y="125" font-family="Georgia, serif" font-weight="bold" font-size="72" fill="url(#goldL)">L</text>
  <!-- R (blue) -->
  <text x="74" y="125" font-family="Georgia, serif" font-weight="bold" font-size="72" fill="url(#blueR)">R</text>
  <!-- V -->
  <text x="128" y="125" font-family="Georgia, serif" font-weight="bold" font-size="72" fill="url(#goldV)">V</text>

  <!-- Bottom text arc approximation -->
  <text x="100" y="168" font-family="Georgia, serif" font-size="9" fill="#1B3D8C" text-anchor="middle" letter-spacing="2" font-weight="bold">LE RENDEZVOUS ATLANTA</text>
</svg>
